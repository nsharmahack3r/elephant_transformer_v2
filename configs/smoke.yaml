data:
  context_len: 8
  horizon: 4
  gap_threshold_hours: 6.0

model:
  d_model: 64
  n_layers: 2
  n_heads: 4
  dropout: 0.1
  n_mixtures: 3

train:
  lr: 0.0003
  max_epochs: 5
  warmup_steps: 10
  batch_size: 8
  num_workers: 0
  val_every_n_epochs: 1
  augment_rotate: false
  augment_jitter: false
  augment_subsample: false
  fixed_val_elephants: ["LA14"]
  fixed_test_elephants: ["LA26"]

seed: 42
